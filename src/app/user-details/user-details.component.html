<h2>User Details</h2>

@if(user){
    <div>
    <p><b>Username:</b> {{user.username}}</p>
   <p><b>Date of Birth:</b> {{user.dob}}</p>

 </div> 
}



<hr>

<h3>User Files</h3>

@if(files.length > 0){
    <ul>
    @for(file of files;track file.name){
        <li>
        <div>
            <a [href]="file.url" target="_blank">
                {{file.name}}
            </a>
        </div>
        </li>
    }
        </ul>
}


@if(files.length == 0){
<p >
No files uploaded
</p>
}
